<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(conteudoPagina)" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Solê Recreação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="icones-fixos">
    <div class="icone icon-1"></div>
    <div class="icone icon-2"></div>
    <div class="icone icon-3"></div>
    <div class="icone icon-4"></div>
    <div class="icone icon-5"></div>
    <div class="icone icon-6"></div>
    <div class="icone icon-7"></div>
    <div class="icone icon-8"></div>
    <div class="icone icon-9"></div>
    <div class="icone icon-10"></div>
</div>

<header>
    <div class="logo">
        <a th:href="@{/home}"><img th:src="@{/images/logo.png}" alt="Solê"></a>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="menu">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/servicos}">Serviços</a>
        <a th:href="@{/galeria}">Galeria</a>
        <a th:href="@{/sobre}">Sobre</a>
        <a th:href="@{/contato}">Contato</a>
    </nav>
</header>

<main>
    <div th:replace="${conteudoPagina}"></div>
</main>

<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-info">
            <img th:src="@{/images/logo.png}" alt="Solê Logo" class="footer-logo">
            <p>Transformando diversão em momentos inesquecíveis.</p>
        </div>

        <div class="footer-links">
            <h4>Navegação</h4>
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/servicos}">Serviços</a>
            <a th:href="@{/galeria}">Galeria</a>
        </div>

        <div class="footer-social">
            <h4>Siga-nos</h4>
            <div class="social-icons">
                <a href="https://instagram.com/sole.recreacao" target="_blank">
                    <img th:src="@{/images/instagram.png}" alt="Instagram">
                </a>
                <a href="https://wa.me/5512982019308" target="_blank">
                    <img th:src="@{/images/whatsapp.png}" alt="WhatsApp">
                </a>
            </div>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 Solê Recreação - Todos os direitos reservados.</p>
    </div>
</footer>

<script>
    function toggleMenu(){
        document.getElementById('menu').classList.toggle('active');
    }
</script>

</body>
</html>
